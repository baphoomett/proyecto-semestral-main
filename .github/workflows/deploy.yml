name: CI/CD Pipeline

on:
  push:
    branches:
      - deploy

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login a ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build y Push back-ventas
        run: |
          docker build -t ${{ secrets.ECR_REPO_URL_BACKEND }}:latest \
            ./back-Ventas_SpringBoot/Springboot-API-REST
          docker push ${{ secrets.ECR_REPO_URL_BACKEND }}:latest

      - name: Build y Push back-despachos
        run: |
          docker build -t ${{ secrets.ECR_REPO_URL_BACKEND_DESPACHOS }}:latest \
            ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
          docker push ${{ secrets.ECR_REPO_URL_BACKEND_DESPACHOS }}:latest

      - name: Build y Push front
        run: |
          docker build \
            --build-arg VITE_API_VENTAS=http://34.238.23.161:8080 \
            --build-arg VITE_API_DESPACHOS=http://34.238.23.161:8081 \
            -t ${{ secrets.ECR_REPO_URL_FRONTEND }}:latest \
            ./front_despacho
          docker push ${{ secrets.ECR_REPO_URL_FRONTEND }}:latest

      - name: Deploy en EC2 via SSM
        run: |
          aws ssm send-command \
            --instance-ids ${{ secrets.EC2_FRONTEND_INSTANCE_ID }} \
            --document-name "AWS-RunShellScript" \
            --parameters '{"commands":["aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}","docker pull ${{ secrets.ECR_REPO_URL_BACKEND }}:latest","docker pull ${{ secrets.ECR_REPO_URL_BACKEND_DESPACHOS }}:latest","docker pull ${{ secrets.ECR_REPO_URL_FRONTEND }}:latest","cd /home/ec2-user/proyecto && docker-compose down && docker-compose up -d"]}' \
            --region ${{ secrets.AWS_REGION }}